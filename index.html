<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест загрузки фото</title>
</head>
<body>
    <h1>Тест загрузки фото</h1>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="upload()">Загрузить</button>
    <pre id="output"></pre>

    <script>
        const API_BASE = 'https://garage-courier-everybody.ngrok-free.dev';
        const user_id = 1211243; // используем известный fallback ID

        function log(msg) {
            document.getElementById('output').textContent += msg + '\n';
            console.log(msg);
        }

        async function upload() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) {
                log('Выберите файл');
                return;
            }
            log('Файл выбран: ' + file.name + ', размер: ' + file.size);

            const formData = new FormData();
            formData.append('file', file);

            try {
                const url = `${API_BASE}/upload_photo?user_id=${user_id}`;
                log('Отправка запроса на ' + url);
                const resp = await fetch(url, {
                    method: 'POST',
                    body: formData,
                    // без заголовков, просто FormData
                });
                log('Статус ответа: ' + resp.status);
                const text = await resp.text();
                log('Ответ сервера: ' + text);
                try {
                    const json = JSON.parse(text);
                    log('Парсинг JSON успешен:');
                    log(JSON.stringify(json, null, 2));
                } catch (e) {
                    log('Не удалось распарсить JSON: ' + e.message);
                }
            } catch (err) {
                log('Ошибка: ' + err.message);
            }
        }
    </script>
</body>
</html>
